# --- Look and Feel configuration for Hyprland
#
# For a reference of the different sections and variables used in this file, see
# https://wiki.hyprland.org/Configuring/Variables.

source = ./themes/catppuccin/latte.conf

general {
  gaps_in = 8
  gaps_out = 16

  border_size = 2

  col.active_border = $sky rgba($pinkAlphaee) 45deg
  col.inactive_border = $crust

  layout = dwindle
}

decoration {
  rounding = 4
  rounding_power = 10.0

  active_opacity = 1.0
  inactive_opacity = 0.9

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba($crustAlphaee)
  }

  blur {
    enabled = true
    size = 10
    passes = 1

    vibrancy = 0.1696
  }
}
