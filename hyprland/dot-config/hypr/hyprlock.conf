$font = Monospace

soruce = ./hyprlock/animations.conf
soruce = ./hyprlock/background.conf
soruce = ./hyprlock/general.conf
soruce = ./hyprlock/input-field.conf
soruce = ./hyprlock/labels.conf

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    path = screenshot
    blur_passes = 3
}

general {
    hide_cursor = false
}

input-field {
    size = 20%, 5%
    outline_thickness = 3

    fade_on_empty = true
    rounding = 100

    font_family = $font
    placeholder_text = Input password …
    fail_text = $PAMFAIL

    dots_spacing = 0.3
    position = 0, -20
    halign = center
    valign = center
}

label {
    text = cmd[update:60] date +"%R"
    font_size = 90
    font_family = $font

    position = -30, 0
    halign = right
    valign = top
}

label {
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 25
    font_family = $font

    position = -40, -150
    halign = right
    valign = top
}
